name: PHP Composer

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  check:

    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php-version: [ "8.2", "8.3", "8.4", "8.5" ]

    name: PHP ${{ matrix.php-version }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: none
          tools: composer:v2

      - name: Validate composer.json
        run: composer validate --strict

      - name: Install dependencies
        run: composer update --prefer-dist --no-progress --no-interaction

      - name: Run checks
        run: composer check

  optional-packages-absent:

    runs-on: ubuntu-latest

    name: Optional packages absent

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          coverage: none
          tools: composer:v2

      - name: Validate composer.json
        run: composer validate --strict

      - name: Remove optional packages
        run: |
          composer remove --dev --no-update --no-plugins \
            cycle/entity-behavior \
            cycle/migrations \
            cycle/schema-migrations-generator \
            symfony/console
          composer update --prefer-dist --no-progress --no-interaction --no-plugins

      - name: Run optional-absent tests
        run: vendor/bin/phpunit --colors=always --testdox test/OptionalPackagesAbsentTest.php
